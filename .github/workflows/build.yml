name: Checks

# Fast, deterministic checks on every push. Generated examples are created in
# the runner, not committed.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
      - name: Deterministic integrity checks
        run: bun run check
      - name: site-gen renderer smoke
        run: SITE_GEN_USE_FIXTURE=1 bun site-gen/ingest.ts && bun site-gen/build.tsx
