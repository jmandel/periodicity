name: Checks

# Fast, deterministic, network-light checks on every push: compile the FSH and
# run the integrity checks on the generated resources + the worked-example
# Bundle. The FULL IG publish (HTML site, profile validation, terminology) is
# done by the FHIR auto IG builder at build.fhir.org/ig/jmandel/periodicity —
# that pipeline owns the template/Jekyll/publisher toolchain, so we don't
# duplicate (and re-fight) it here.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Compile FSH
        run: ./_sushi.sh
      - name: Deterministic integrity checks
        run: python3 scripts/check_mvp.py
