name: Deploy viewer to Pages

# Bundles the clinician viewer SPA (viewer-src/) with esbuild and publishes it
# to GitHub Pages. The build emits index.html + app.js into
# input/images/viewer/, so the site root index.html IS the viewer.

on:
  push:
    branches: [main]
    paths:
      - 'viewer-src/**'
      - 'scripts/build-viewer.ts'
      - '.github/workflows/deploy-viewer.yml'
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build viewer
        run: bun scripts/build-viewer.ts
      - uses: actions/configure-pages@v5
      - name: Upload viewer as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # build-viewer.ts writes index.html + app.js here; index.html is the viewer.
          path: input/images/viewer

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
