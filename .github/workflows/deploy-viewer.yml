name: Deploy site to Pages

# Builds the IG site, generated example Bundle, reference viewer, sample JWE, and
# sample SHLink in the runner. Generated artifacts are uploaded to Pages but are
# not committed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: oven-sh/setup-bun@v2
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Install Jekyll
        run: gem install jekyll --no-document
      - name: Build static site
        run: bun run build:site
        env:
          GRAPHVIZ_DOT: /usr/bin/dot
          VIEWER_BASE: https://cycle.fhir.me/view
          PAGES_CNAME: cycle.fhir.me
      - uses: actions/configure-pages@v5
      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
